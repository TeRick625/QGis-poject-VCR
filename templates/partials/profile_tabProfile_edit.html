<div class="bg-white rounded-3xl shadow-lg p-6 max-w-2xl">
    <h3 class="font-semibold text-lg mb-6">Редактирование профиля</h3>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
        <!-- Левая колонка – поля ввода -->
        <div class="sm:col-span-2 space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Имя</label>
                <input type="text" x-model="profileState.editForm.name"
                       class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" x-model="profileState.editForm.email"
                       class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Новый пароль (если нужно)</label>
                <input type="password" x-model="profileState.editForm.password" placeholder="········"
                       class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>
        </div>

        <!-- Правая колонка – смена аватара -->
        <div class="flex flex-col items-center gap-3">
            <p class="text-sm font-medium text-slate-700">Аватар</p>
            <div class="w-32 h-32 rounded-full bg-gradient-to-br from-blue-400 to-blue-600 flex items-center justify-center text-white text-4xl font-bold shadow-md">
                <span x-text="profileState.user.name.split(' ').map(n => n[0]).join('').slice(0, 2)"></span>
            </div>
            <label class="inline-block px-4 py-2 bg-slate-100 hover:bg-slate-200 text-sm rounded-xl cursor-pointer transition">
                Загрузить фото
                <input type="file" accept="image/*" class="hidden" @change="previewAvatar($event)">
            </label>
            <p class="text-xs text-slate-400">JPG, PNG (до 5 МБ)</p>
        </div>
    </div>

    <!-- Кнопки действий -->
    <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-slate-200">
        <button @click="cancelEditProfile()"
                class="px-6 py-2.5 border border-slate-300 rounded-xl text-sm hover:bg-slate-50 transition">
            Отмена
        </button>
        <button @click="saveProfile()"
                :disabled="profileState.isSaving"
                class="px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm hover:bg-blue-700 disabled:opacity-60 transition flex items-center gap-2">
            <span x-show="profileState.isSaving" class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
            <span x-text="profileState.isSaving ? 'Сохранение...' : 'Сохранить'"></span>
        </button>
    </div>
</div>
