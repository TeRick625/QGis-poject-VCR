<div x-show="state.mode === 'selection'" class="grid grid-cols-12 gap-6 h-[680px] overflow-hidden">
    <!-- Левая часть: три колонки (полигоны, спутники, аэро) -->
    <div class="col-span-7 grid grid-cols-3 gap-5 h-full min-h-0">

        <!-- 1. Области интереса -->
        <div class="bg-white rounded-3xl shadow p-4 flex flex-col h-full min-h-0">
            <!-- В блоке "Области интереса" -->
            <div class="flex items-center justify-between mb-3">
                <h3 class="font-medium text-sm">Области интереса</h3>
                <button @click="openUploadModalFor('polygon')"
                        class="text-blue-600 hover:text-blue-700 text-lg leading-none"
                        title="Загрузить полигон (KML)">+</button>
            </div>
            <div class="flex-1 min-h-0 overflow-y-auto space-y-1 pr-1">
                <template x-for="area in areasFiltered" :key="area.id">
                    <div class="border border-slate-200 rounded-xl overflow-hidden">
                        <!-- Основная строка полигона -->
                        <div @click="togglePolygonAccordion(area.id)"
                             class="flex items-center px-3 py-2 cursor-pointer transition-colors hover:bg-slate-50"
                             :class="{
                                 'bg-blue-200 ring-2 ring-blue-500': state.selectedAreaId === area.id && !state.selectedItem?.isSubItem,
                                 'bg-slate-50': state.selectedAreaId !== area.id || state.selectedItem?.isSubItem
                             }">
                            <span class="inline-block w-3 h-3 bg-blue-500 rounded-full mr-2 flex-shrink-0"></span>
                            <span class="flex-1 text-sm font-medium scroll-on-hover" x-text="area.name"></span>
                            <!-- Индикатор количества снимков -->
                            <span x-show="hasSatelliteImages(area)" 
                                  class="text-xs text-blue-600 font-medium mr-2 bg-blue-100 px-2 py-0.5 rounded-full"
                                  x-text="`${getSatelliteImagesCount(area)} сним.`"></span>
                            <span class="text-xs text-slate-400 mr-2" x-text="new Date(area.dateAdded).toLocaleDateString('ru-RU')"></span>
                            <span x-show="hasSatelliteImages(area)" class="text-xl transition-transform"
                                  :class="isPolygonExpanded(area.id) ? 'rotate-90' : ''">›</span>
                        </div>

                        <!-- Подсписок спутниковых снимков -->
                        <div x-show="isPolygonExpanded(area.id) && hasSatelliteImages(area)"
                             class="border-t border-slate-100 bg-slate-50">
                            <template x-for="(sub, index) in area.subItems" :key="sub.id">
                                <div @click="selectSubItem(sub, area)"
                                     class="flex items-center pl-8 pr-3 py-1.5 cursor-pointer hover:bg-blue-100 transition-colors"
                                     :class="state.selectedItem?.id === sub.id ? 'bg-blue-200 ring-2 ring-blue-500' : ''">
                                    <span class="inline-block w-2 h-2 bg-green-500 rounded-full mr-2"></span>
                                    <span class="flex-1 text-sm" x-text="sub.name"></span>
                                    <span class="text-xs text-slate-400 mr-2" x-text="`${index + 1}/${area.subItems.length}`"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
            <button @click="openFindImagesModal()"
                    :disabled="!state.selectedItem || state.selectedItem.type !== 'area' || state.selectedItem.isSubItem"
                    class="w-full mt-3 py-2 bg-amber-600 hover:bg-amber-700 disabled:bg-gray-400 text-white font-medium rounded-xl text-xs transition-colors">
                Найти снимки
            </button>
        </div>

        <!-- 2. Спутниковые снимки -->
        <div class="bg-white rounded-3xl shadow p-4 flex flex-col h-full min-h-0">
            <!-- В блоке "Спутниковые снимки" -->
            <div class="flex items-center justify-between mb-3">
                <h3 class="font-medium text-sm">Спутниковые снимки</h3>
                <button @click="openUploadModalFor('satellite')"
                        class="text-blue-600 hover:text-blue-700 text-lg leading-none"
                        title="Загрузить спутниковый снимок (GeoTIFF)">+</button>
            </div>
            <div class="flex-1 min-h-0 overflow-y-auto space-y-1 pr-1">
                <template x-for="item in satellitesFiltered" :key="item.id">
                    <div @click="selectItem('satellite', item)"
                         class="flex items-center px-3 py-2 cursor-pointer border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors"
                         :class="state.selectedSatelliteId === item.id ? 'bg-blue-200 ring-2 ring-blue-500' : ''">
                        <span class="inline-block w-3 h-3 bg-green-500 rounded-full mr-2"></span>
                        <span class="flex-1 text-sm font-medium scroll-on-hover" x-text="item.name"></span>
                        <span class="text-xs text-slate-400" x-text="new Date(item.dateAdded).toLocaleDateString('ru-RU')"></span>
                    </div>
                </template>
            </div>
        </div>

        <!-- 3. Аэрофотоснимки -->
        <div class="bg-white rounded-3xl shadow p-4 flex flex-col h-full min-h-0">
            <!-- В блоке "Аэрофотоснимки" -->
            <div class="flex items-center justify-between mb-3">
                <h3 class="font-medium text-sm">Аэрофотоснимки</h3>
                <button @click="openUploadModalFor('aero')"
                        class="text-blue-600 hover:text-blue-700 text-lg leading-none"
                        title="Загрузить аэрофото (JPG/PNG)">+</button>
            </div>
            <div class="flex-1 min-h-0 overflow-y-auto space-y-1 pr-1">
                <template x-for="item in aeroImagesFiltered" :key="item.id">
                    <div class="border border-slate-200 rounded-xl overflow-hidden">
                        <div @click="item.children_ids?.length ? toggleSubList(item.id) : selectItem('aero', item)"
                             class="flex items-center px-3 py-2 cursor-pointer hover:bg-slate-50 transition-colors"
                             :class="{
                                 'bg-blue-200 ring-2 ring-blue-500': state.selectedAeroId === item.id && !state.selectedItem?.isSubItem,
                                 'bg-slate-50': state.selectedAeroId !== item.id || state.selectedItem?.isSubItem
                             }">
                            <span class="inline-block w-3 h-3 bg-yellow-500 rounded-full mr-2"></span>
                            <span class="flex-1 text-sm font-medium scroll-on-hover" x-text="item.name"></span>
                            <span class="text-xs text-slate-400 mr-2" x-show="item.children_ids?.length">+KML</span>
                            <span x-show="item.children_ids?.length" class="text-xl transition-transform"
                                  :class="state.openAreaId === item.id ? 'rotate-90' : ''">›</span>
                        </div>

                        <!-- Дочерние элементы (KML) -->
                        <div x-show="state.openAreaId === item.id && item.children_ids?.length"
                             class="border-t border-slate-100 bg-slate-50">
                            <template x-for="childId in item.children_ids" :key="childId">
                                <div x-data="{ child: state.workspaceItems.find(i => i.id === childId) }">
                                    <template x-if="child">
                                        <div @click="selectSubItem(child.id, item)"
                                             class="flex items-center pl-8 pr-3 py-1.5 cursor-pointer hover:bg-blue-100 transition-colors"
                                             :class="state.selectedItem?.id === child.id ? 'bg-blue-200 ring-2 ring-blue-500' : ''">
                                            <span class="inline-block w-2 h-2 bg-blue-500 rounded-full mr-2"></span>
                                            <span class="flex-1 text-sm" x-text="child.name"></span>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Правая панель: нейросети и кнопка запуска -->
    <div class="col-span-5 bg-white rounded-3xl shadow p-6 flex flex-col h-full min-h-0">
        <h3 class="font-medium mb-5">Доступные нейросети</h3>
        <div class="space-y-4 flex-1 min-h-0 overflow-y-auto pr-2">
            <template x-for="nn in getFilteredNN()" :key="nn.id">
                <div class="nn-card p-5 rounded-3xl border transition-all cursor-pointer hover:shadow-md"
                     :class="state.selectedNN?.id === nn.id ? 'border-blue-600 bg-blue-50 ring-2 ring-blue-600 ring-inset' : 'border-slate-200 hover:border-slate-300'"
                     @click="selectNN(nn)">
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-semibold" x-text="nn.name"></h4>
                            <p class="text-sm text-slate-600 mt-1" x-text="nn.shortDesc"></p>
                            <p class="text-xs text-slate-400 mt-1" x-text="'Подходит для: ' + nn.applicableTo"></p>
                        </div>
                    </div>
                    <!-- Раскрывающееся описание -->
                    <div x-show="state.selectedNN?.id === nn.id" class="mt-3 pt-3 border-t border-slate-200">
                        <p class="text-sm text-slate-600" x-text="nn.detail"></p>
                    </div>
                </div>
            </template>
        </div>
        <button @click="runAnalysis()"
                :disabled="!canRunAnalysis"
                class="mt-6 w-full py-4 bg-green-600 hover:bg-green-700 disabled:bg-gray-400 text-white font-medium rounded-2xl text-lg transition-colors">
            🚀 Запустить анализ
        </button>
    </div>
</div>
