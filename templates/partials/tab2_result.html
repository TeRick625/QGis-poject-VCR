<!-- РЕЖИМ РЕЗУЛЬТАТА -->
<div x-show="state.mode === 'result'" class="grid grid-cols-12 gap-6 h-[680px]">
    <!-- Две широкие панели: исходник и результат -->
    <div class="col-span-7 grid grid-cols-2 gap-5 h-full">
        <!-- Панель исходного снимка (общая для спутника и аэро) -->
        <div class="bg-white rounded-3xl shadow p-4 flex flex-col">
            <h3 class="font-medium mb-3 text-sm">
                <span x-show="algorithmMode === 'satellite'">Исходный спутниковый снимок</span>
                <span x-show="algorithmMode === 'aero'">Исходный аэрофотоснимок</span>
            </h3>
            <div class="relative flex-1 bg-slate-100 rounded-2xl overflow-hidden">
                <div class="w-full h-full flex items-center justify-center text-slate-400 text-sm">
                    [Изображение]
                </div>
                <!-- Слой точек усыхания (только для спутника) -->
                <div x-show="algorithmMode === 'satellite'"
                     class="absolute inset-0 pointer-events-none"
                     :style="'opacity:' + dryingLayerOpacity">
                    <div class="w-full h-full flex items-center justify-center text-red-500 text-sm bg-red-200/30">
                        Точки зон усыхания
                    </div>
                </div>
            </div>
            <!-- Ползунок прозрачности слоя (только для спутника) -->
            <div x-show="algorithmMode === 'satellite'" class="mt-3">
                <label class="text-xs text-slate-500">Прозрачность слоя зон усыхания</label>
                <input type="range" min="0" max="1" step="0.1"
                       x-model="dryingLayerOpacity" class="w-full">
            </div>
        </div>

        <!-- Панель результата анализа (хитмап) -->
        <div class="bg-white rounded-3xl shadow p-4 flex flex-col">
            <h3 class="font-medium mb-3 text-sm">Результат анализа</h3>
            <div class="relative flex-1 bg-slate-100 rounded-2xl overflow-hidden">
                <div class="w-full h-full flex items-center justify-center text-slate-400 text-sm">
                    Хитмап
                </div>
            </div>
        </div>
    </div>

    <!-- Правая панель: история и статистика -->
    <div class="col-span-5 bg-white rounded-3xl shadow p-6 flex flex-col h-full">
        <h3 class="font-medium mb-4">История анализов</h3>
        <div class="flex-1 overflow-y-auto space-y-3 pr-2">
            <template x-for="(item, i) in state.analysisHistory" :key="item.id">
                <div @click="selectHistoryItem(i)"
                     class="p-4 rounded-2xl cursor-pointer transition-all"
                     :class="i === state.currentResultIndex ? 'bg-blue-50 border border-blue-600' : 'bg-slate-50 hover:bg-slate-100'">
                    <div class="flex justify-between text-sm">
                        <span class="font-medium" x-text="item.nnName"></span>
                        <span class="text-slate-500" x-text="item.timestamp"></span>
                    </div>
                    <p class="text-xs text-slate-600 mt-1" x-text="item.itemName"></p>
                </div>
            </template>
        </div>
        <div class="mt-6 pt-6 border-t">
            <h4 class="text-sm font-medium mb-3">Статистика и описание</h4>
            <div id="resultStats" class="bg-slate-50 rounded-2xl p-5 text-sm overflow-y-auto max-h-52">
                <span x-show="algorithmMode === 'satellite'">
                    Спутниковый анализ. Площадь зон усыхания: ...
                </span>
                <span x-show="algorithmMode === 'aero'">
                    Аэрофото анализ. Детализация: ...
                </span>
                <span x-show="algorithmMode === 'multidate'">
                    Многодатный анализ. В разработке.
                </span>
            </div>
        </div>
    </div>
</div>
