<!-- РЕЖИМ РЕЗУЛЬТАТА -->
<div x-show="state.mode === 'result'" class="grid grid-cols-12 gap-6 h-[680px] overflow-hidden">

    <!-- ЛЕВАЯ ЧАСТЬ: ИЗОБРАЖЕНИЯ -->
    <div class="col-span-7 grid grid-cols-2 gap-5 h-full">

        <!-- === АЭРОФОТО АНАЛИЗ === -->
        <template x-if="algorithmMode === 'aero'">
            <div class="col-span-2 grid grid-cols-2 gap-5 h-full">
                <!-- Левая рамка: Оригинал -->
                <div class="bg-white rounded-3xl shadow p-4 flex flex-col">
                    <h3 class="font-medium mb-3 text-sm">Оригинальный аэрофотоснимок</h3>
                    <div class="relative flex-1 bg-slate-100 rounded-2xl overflow-hidden flex items-center justify-center">
                        <div class="w-full h-full flex items-center justify-center" style="transform: rotate(90deg);">
                            <img :src="state.activeResult?.algorithmData?.result_files?.original_url"
                                 class="max-w-full max-h-full object-contain shadow-lg"
                                 alt="Original Aero">
                        </div>
                    </div>
                </div>

                <!-- Правая рамка: Сэндвич (Оригинал + Хитмап) -->
                <div class="bg-white rounded-3xl shadow p-4 flex flex-col">
                    <h3 class="font-medium mb-3 text-sm">Тепловая карта усыхания</h3>
                    <div class="relative flex-1 bg-slate-100 rounded-2xl overflow-hidden flex items-center justify-center">
                        <div class="w-full h-full flex items-center justify-center" style="transform: rotate(90deg);">
                            <div class="relative max-w-full max-h-full">
                                <img :src="state.activeResult?.algorithmData?.result_files?.original_url"
                                     class="max-w-full max-h-full object-contain shadow-lg"
                                     alt="Original">
                                <img :src="state.activeResult?.algorithmData?.result_files?.heatmap_url"
                                     class="absolute inset-0 w-full h-full object-contain pointer-events-none"
                                     :style="'opacity:' + (state.activeResult?.aeroOverlayOpacity || 0.6)"
                                     alt="Heatmap">
                            </div>
                        </div>
                    </div>
                    <div class="mt-3">
                        <label class="text-xs text-slate-500">Прозрачность тепловой карты</label>
                        <input type="range" min="0" max="1" step="0.05"
                               x-model="state.activeResult.aeroOverlayOpacity"
                               class="w-full accent-blue-600">
                    </div>
                </div>
            </div>
        </template>

        <!-- === ЗАГЛУШКИ ДЛЯ ДРУГИХ РЕЖИМОВ === -->
        <template x-if="algorithmMode === 'satellite'">
            <div class="col-span-2 grid grid-cols-2 gap-5 h-full">
                <div class="bg-white rounded-3xl shadow p-4 flex flex-col">
                    <h3 class="font-medium mb-3 text-sm">Исходный спутниковый снимок</h3>
                    <div class="flex-1 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-400">[Спутник]</div>
                </div>
                <div class="bg-white rounded-3xl shadow p-4 flex flex-col">
                    <h3 class="font-medium mb-3 text-sm">Результат анализа</h3>
                    <div class="flex-1 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-400">[Хитмап]</div>
                </div>
            </div>
        </template>

        <template x-if="algorithmMode === 'multidate'">
            <div class="col-span-2 grid grid-cols-2 gap-5 h-full">
                <div class="bg-white rounded-3xl shadow p-4 flex flex-col">
                    <h3 class="font-medium mb-3 text-sm">Временной ряд</h3>
                    <div class="flex-1 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-400">[Мультидата]</div>
                </div>
                <div class="bg-white rounded-3xl shadow p-4 flex flex-col">
                    <h3 class="font-medium mb-3 text-sm">Динамика</h3>
                    <div class="flex-1 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-400">[График]</div>
                </div>
            </div>
        </template>

    </div>

    <!-- ПРАВАЯ ЧАСТЬ: ИСТОРИЯ И СТАТИСТИКА -->
    <div class="col-span-5 bg-white rounded-3xl shadow p-6 flex flex-col h-full min-h-0">
        <h3 class="font-medium mb-4">История анализов</h3>
        <div class="flex-1 overflow-y-auto space-y-3 pr-2">
            <template x-for="(item, i) in state.analysisHistory" :key="item.id">
                <div @click="selectHistoryItem(i)"
                     class="p-4 rounded-2xl cursor-pointer transition-all"
                     :class="i === state.currentResultIndex ? 'bg-blue-50 border border-blue-600' : 'bg-slate-50 hover:bg-slate-100'">
                    <div class="flex justify-between text-sm">
                        <span class="font-medium" x-text="item.nnName"></span>
                        <span class="text-slate-500" x-text="item.timestamp"></span>
                    </div>
                    <p class="text-xs text-slate-600 mt-1" x-text="item.itemName"></p>
                </div>
            </template>
        </div>

        <!-- Блок статистики -->
        <div class="mt-6 pt-6 border-t">
            <h4 class="text-sm font-medium mb-3">Статистика и описание</h4>
            <div id="resultStats" class="bg-slate-50 rounded-2xl p-5 text-sm overflow-y-auto max-h-52">
                <span x-show="algorithmMode === 'satellite'">Спутниковый анализ. Площадь зон усыхания: ...</span>

                <span x-show="algorithmMode === 'aero'">
                    Аэрофото анализ.<br>
                    <template x-if="state.activeResult?.algorithmData?.metrics">
                        <div class="mt-2 space-y-1">
                            <p>Общая площадь: <b x-text="(state.activeResult.algorithmData.metrics.total_area_ha || 0) + ' га'"></b></p>
                            <p>Площадь усыхания: <b x-text="(state.activeResult.algorithmData.metrics.drying_area_ha || 0) + ' га'"></b></p>
                            <p>Процент усыхания: <b class="text-red-600" x-text="(state.activeResult.algorithmData.metrics.drying_percent || 0) + '%'"></b></p>
                        </div>
                    </template>
                </span>
            </div>
        </div>
    </div>
</div>
